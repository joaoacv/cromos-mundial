<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cromos Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0F0F0F;--surface:#1A1A1A;--surface2:#222;--surface3:#2A2A2A;--border:#333;--text:#FFF;--muted:#888;--muted2:#555;--green:#4CAF50;--green-dim:#1a3d1a;--gold:#F4C430;--gold-dim:#3d2e00;--red:#E53935;--radius:16px;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden;}
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.lbox{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;max-width:360px;width:100%;text-align:center;}
.lbox h2{font-size:22px;font-weight:900;margin-bottom:6px;letter-spacing:-.5px;}
.lbox p{font-size:13px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}
.lbox input,.lbox select{width:100%;margin-bottom:10px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;}
.lbox input::placeholder{color:var(--muted);}
.lbox select option{background:var(--surface2);}
.lbox button{width:100%;padding:13px;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:opacity .15s;}
.lbox button:hover{opacity:.88;}
#appScreen{display:none;height:100%;flex-direction:column;}
#appScreen.show{display:flex;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:18px;font-weight:900;letter-spacing:-.5px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);}
.dot.on{background:var(--green);}
.btn-sm{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;}
.btn-sm:hover{background:var(--surface2);color:var(--text);}
.app-body{flex:1;display:flex;overflow:hidden;}
.sidenav{width:64px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0;}
.snav{width:48px;height:48px;border-radius:12px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;}
.snav .ico{font-size:20px;line-height:1;}
.snav:hover{background:var(--surface2);color:var(--text);}
.snav.active{background:var(--surface3);color:var(--gold);}
.main{flex:1;overflow-y:auto;overflow-x:hidden;}
.section{display:none;}
.section.active{display:block;}
.col-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:10;}
.col-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.col-title{font-size:17px;font-weight:800;}
.col-pct{font-size:22px;font-weight:900;color:var(--gold);}
.col-pct-sub{font-size:11px;color:var(--muted);text-align:right;}
.global-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.global-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s;}
.col-search{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;}
.col-search::placeholder{color:var(--muted);}
.legend-row{display:flex;gap:14px;padding:8px 16px 0;flex-wrap:wrap;align-items:center;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-chip{width:26px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.leg-chip.empty{background:var(--surface2);border:1px solid var(--border);color:var(--muted2);}
.leg-chip.have{background:var(--green-dim);border:1px solid var(--green);color:var(--green);}
.leg-chip.rep{background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold);}
.album-content{padding:8px 12px 80px;}
.team-block{margin-bottom:8px;}
.team-label{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 6px;cursor:pointer;user-select:none;}
.team-code{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.08em;}
.team-name-full{font-size:12px;color:var(--muted2);margin-left:8px;}
.team-right{display:flex;align-items:center;gap:8px;}
.team-prog-bar{width:60px;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.team-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.team-count{font-size:11px;color:var(--muted);white-space:nowrap;}
.team-tog{font-size:10px;color:var(--muted2);transition:transform .2s;}
.team-tog.open{transform:rotate(180deg);}
.team-grid{display:none;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:6px;padding-bottom:6px;}
.team-grid.open{display:grid;}
.chip{aspect-ratio:1;border-radius:14px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;position:relative;user-select:none;transition:transform .1s,background .1s,border-color .1s;-webkit-tap-highlight-color:transparent;}
.chip-num{font-size:18px;font-weight:900;color:var(--muted);line-height:1;}
.chip-code{font-size:9px;font-weight:600;color:var(--muted2);margin-top:2px;letter-spacing:.04em;}
.chip:active{transform:scale(.9);}
.chip.have{background:var(--green-dim);border-color:var(--green);}
.chip.have .chip-num{color:var(--green);}
.chip.have .chip-code{color:var(--green);opacity:.7;}
.chip.rep{background:var(--gold-dim);border-color:var(--gold);}
.chip.rep .chip-num{color:var(--gold);}
.chip.rep .chip-code{color:var(--gold);opacity:.7;}
.chip .rep-badge{position:absolute;top:-5px;right:-5px;background:var(--gold);color:#000;border-radius:50%;width:18px;height:18px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
.pad{padding:16px;}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.gcard.me{border-color:var(--gold);}
.gcard-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.gcard-name{font-weight:800;font-size:16px;}
.gcard-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.gstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.gstat{background:var(--surface2);border-radius:10px;padding:10px 6px;text-align:center;}
.gstat-n{font-size:20px;font-weight:900;}
.gstat-l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}
.me-tag{font-size:11px;color:var(--gold);font-weight:600;margin-left:4px;}
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fb{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;color:var(--muted);font-weight:500;}
.fb.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.thead{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.tname{font-weight:700;font-size:14px;}
.tbody{display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;}
.tcolt{font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.badge-m{background:rgba(76,175,80,.2);color:var(--green);border-radius:99px;font-size:11px;font-weight:700;padding:3px 10px;border:1px solid rgba(76,175,80,.4);}
.badge-p{background:rgba(244,196,48,.15);color:var(--gold);border-radius:99px;font-size:11px;font-weight:700;padding:3px 10px;border:1px solid rgba(244,196,48,.3);}
.ctag{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:6px;font-size:10px;font-weight:700;background:var(--green-dim);border:1px solid rgba(76,175,80,.4);color:var(--green);white-space:nowrap;margin:2px 2px 2px 0;font-family:'Inter',monospace;}
.ctag .qb{background:rgba(76,175,80,.3);border-radius:3px;font-size:8px;padding:0 3px;height:13px;display:inline-flex;align-items:center;}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.rtitle{font-size:15px;font-weight:800;margin-bottom:4px;}
.rhint{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.rffull{margin-bottom:12px;}
.rffull label,.rf label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;display:block;margin-bottom:5px;}
.rffull select,.rf select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;}
.rffull select option,.rf select option{background:var(--surface2);}
.rform{display:grid;grid-template-columns:1fr 28px 1fr;gap:10px;align-items:start;margin-bottom:14px;}
.rf{display:flex;flex-direction:column;}
.rarrow{text-align:center;padding-top:24px;color:var(--muted);font-size:18px;}
.btn-main{width:100%;padding:13px;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:opacity .15s;}
.btn-main:hover{opacity:.88;}
.log-e{border-left:3px solid var(--green);padding:10px 12px;margin-bottom:8px;background:var(--surface2);border-radius:0 10px 10px 0;font-size:12px;color:var(--muted);line-height:1.7;}
.log-e strong{color:var(--text);}
.log-e .m{color:var(--gold);font-weight:700;font-family:monospace;font-size:13px;}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px;line-height:1.8;}
.qreg-btn{display:inline-flex;align-items:center;padding:6px 12px;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.35);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);transition:all .15s;}
.qreg-btn:hover{background:rgba(76,175,80,.25);border-color:var(--green);}
.qreg-btn:active{transform:scale(.95);}
.sel-chip{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;border-radius:8px;font-family:'Inter',monospace;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .12s;-webkit-tap-highlight-color:transparent;}
.sel-chip:active{transform:scale(.9);}
.sel-chip.on{background:rgba(76,175,80,.2);border-color:var(--green);color:var(--green);}
button.btn-main:disabled{cursor:not-allowed;}
.empty span{font-size:40px;display:block;margin-bottom:10px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
@media(max-width:600px){
  .sidenav{display:none;}
  .botnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:50;}
  .bnav{flex:1;padding:10px 4px 14px;border:none;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:500;}
  .bnav .ico{font-size:20px;}
  .bnav.active{color:var(--gold);}
}
@media(min-width:601px){.botnav{display:none;}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">
    <div style="font-size:52px;margin-bottom:16px;">⚽</div>
    <h2>Cromos Mundial 2026</h2>
    <p>Clica nos cromos que tens. Trocas calculadas automaticamente com os teus amigos.</p>
    <div id="loginContent"><p style="color:var(--muted);font-size:13px;padding:1rem 0;">A ligar...</p></div>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div class="topbar-title">⚽ Mundial 2026</div>
    <div class="topbar-right">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);"><div class="dot" id="dot"></div><span id="stxt">—</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div id="topAvatar" style="border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;"></div>
        <span style="font-size:13px;font-weight:600;" id="sessName"></span>
      </div>
      <button class="btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="app-body">
    <nav class="sidenav">
      <button class="snav active" id="snav-colecao" onclick="switchTab('colecao')"><span class="ico">📋</span>Coleção</button>
      <button class="snav" id="snav-grupo" onclick="switchTab('grupo')"><span class="ico">👥</span>Grupo</button>
      <button class="snav" id="snav-trocas" onclick="switchTab('trocas')"><span class="ico">🔄</span>Trocas</button>
      <button class="snav" id="snav-registar" onclick="switchTab('registar')"><span class="ico">✅</span>Registar</button>
    </nav>
    <div class="main">
      <div id="tab-colecao" class="section active">
        <div class="col-header">
          <div class="col-header-top">
            <div class="col-title">Mi Colección</div>
            <div style="text-align:right;"><div class="col-pct" id="globalPct">0%</div><div class="col-pct-sub" id="globalSub">0 Cromos</div></div>
          </div>
          <div class="global-bar"><div class="global-fill" id="globalFill" style="width:0%"></div></div>
          <input class="col-search" type="text" id="searchInput" placeholder="Pesquisar equipa..." oninput="filterTeams(this.value)"/>
        </div>
        <div class="legend-row">
          <div class="leg"><div class="leg-chip empty">—</div>Não tens</div>
          <div class="leg"><div class="leg-chip have">✓</div>Tens</div>
          <div class="leg"><div class="leg-chip rep">×2</div>Repetido</div>
          <span style="font-size:11px;color:var(--muted2);">Clique = tens &nbsp;·&nbsp; +clique = repetido &nbsp;·&nbsp; pressão longa = remover</span>
        </div>
        <div class="album-content" id="albumGrid"></div>
      </div>
      <div id="tab-grupo" class="section"><div class="pad" id="grupoContent"></div></div>
      <div id="tab-trocas" class="section"><div class="pad"><div class="frow" id="trocaFilters"></div><div id="trocasContent"></div></div></div>
      <div id="tab-registar" class="section"><div class="pad" id="registarContent"></div></div>
    </div>
  </div>
  <nav class="botnav">
    <button class="bnav active" id="bnav-colecao" onclick="switchTab('colecao')"><span class="ico">📋</span>Coleção</button>
    <button class="bnav" id="bnav-grupo" onclick="switchTab('grupo')"><span class="ico">👥</span>Grupo</button>
    <button class="bnav" id="bnav-trocas" onclick="switchTab('trocas')"><span class="ico">🔄</span>Trocas</button>
    <button class="bnav" id="bnav-registar" onclick="switchTab('registar')"><span class="ico">✅</span>Registar</button>
  </nav>
</div>
<div id="toast"></div>

let state={users:[],log:[],currentUserId:null,trocaFilter:'todas',tab:'colecao'};
function me(){return state.users.find(u=>u.id===state.currentUserId);}
function getUser(id){return state.users.find(u=>u.id===id);}
function getCount(u,k){return(u.have&&u.have[k])||0;}
function repCount(u,k){return Math.max(0,getCount(u,k)-1);}
function needsSticker(u,k){return getCount(u,k)===0;}

async function saveUser(u){await setDoc(doc(db,'users',u.id),u);}
async function delUser(id){await deleteDoc(doc(db,'users',id));}
async function saveLog(e){await setDoc(doc(db,'log',e.id),e);}

let booted=false;
function afterFirstLoad(){
  if(booted)return;
  booted=true;
  const saved=localStorage.getItem('cromos_uid');
  if(saved)state.currentUserId=saved;
  if(state.currentUserId&&state.users.find(u=>u.id===state.currentUserId)){enterApp();}
  else{renderLogin();}
}

function startListening(){
  onSnapshot(collection(db,'users'),snap=>{
    snap.docChanges().forEach(ch=>{
      const d=ch.doc.data();
      if(ch.type==='removed')state.users=state.users.filter(u=>u.id!==d.id);
      else{const i=state.users.findIndex(u=>u.id===d.id);if(i>=0)state.users[i]=d;else state.users.push(d);}
    });
    state.users.sort((a,b)=>a.created-b.created);
    document.getElementById('dot').className='dot on';
    document.getElementById('stxt').textContent=`${state.users.length} online`;
    afterFirstLoad();
    if(state.currentUserId)refreshAll();
  });
  onSnapshot(collection(db,'log'),snap=>{
    snap.docChanges().forEach(ch=>{
      const d=ch.doc.data();
      if(ch.type==='removed')state.log=state.log.filter(e=>e.id!==d.id);
      else{const i=state.log.findIndex(e=>e.id===d.id);if(i>=0)state.log[i]=d;else state.log.push(d);}
    });
    state.log.sort((a,b)=>b.ts-a.ts);
    if(state.tab==='registar')renderRegistar();
  });
}

let tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000);}

async function boot(){
  startListening();
  // fallback: se Firebase demorar mais de 5s mostra login à mesma
  setTimeout(()=>afterFirstLoad(),5000);
}

function renderLogin(){
  const area=document.getElementById('loginContent');
  const opts=state.users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  if(!state.users.length){
    area.innerHTML=`<input type="text" id="fn" placeholder="O teu nome"/><button id="bc">Criar grupo →</button>`;
    document.getElementById('bc').addEventListener('click',createAndJoin);
    document.getElementById('fn').addEventListener('keydown',e=>{if(e.key==='Enter')createAndJoin();});
  }else{
    area.innerHTML=`<select id="ls"><option value="">— Seleciona o teu nome —</option>${opts}<option value="__new__">+ Sou novo</option></select><div id="nnr" style="display:none"><input type="text" id="nln" placeholder="O teu nome"/></div><button id="bl">Entrar →</button>`;
    document.getElementById('ls').addEventListener('change',function(){document.getElementById('nnr').style.display=this.value==='__new__'?'block':'none';});
    document.getElementById('bl').addEventListener('click',doLogin);
  }
}
async function createAndJoin(){
  const name=(document.getElementById('fn').value||'').trim();if(!name)return;
  const user={id:uid(),name,color:0,have:{},created:Date.now()};
  await saveUser(user);state.currentUserId=user.id;localStorage.setItem('cromos_uid',user.id);enterApp();
}
async function doLogin(){
  const sel=document.getElementById('ls').value;if(!sel)return;
  if(sel==='__new__'){
    const name=(document.getElementById('nln').value||'').trim();if(!name)return;
    const user={id:uid(),name,color:state.users.length,have:{},created:Date.now()};
    await saveUser(user);state.currentUserId=user.id;localStorage.setItem('cromos_uid',user.id);
  }else{state.currentUserId=sel;localStorage.setItem('cromos_uid',sel);}
  enterApp();
}
function enterApp(){
  document.getElementById('loginScreen').style.display='none';
  const as=document.getElementById('appScreen');as.style.display='flex';as.classList.add('show');
  const u=me();if(!u)return;
  document.getElementById('sessName').textContent=u.name;
  const av=document.getElementById('topAvatar');av.style.cssText=avS(u.color,32);av.textContent=initials(u.name);
  buildAlbum();renderGrupo();renderTrocas();renderRegistar();
}
window.logout=function(){
  state.currentUserId=null;localStorage.removeItem('cromos_uid');
  document.getElementById('loginScreen').style.display='flex';
  const as=document.getElementById('appScreen');as.style.display='none';as.classList.remove('show');
  renderLogin();
};
window.switchTab=function(tab){
  state.tab=tab;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  ['snav','bnav'].forEach(p=>{document.querySelectorAll('.'+p).forEach(b=>b.classList.remove('active'));const e=document.getElementById(p+'-'+tab);if(e)e.classList.add('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='grupo')renderGrupo();
  if(tab==='trocas')renderTrocas();
  if(tab==='registar')renderRegistar();
};
function refreshAll(){
  refreshAlbumChips();updateGlobalProgress();
  if(state.tab==='grupo')renderGrupo();
  if(state.tab==='trocas')renderTrocas();
  if(state.tab==='registar')renderRegistar();
}
function chipId(k){return'c-'+k.replace(/\s/g,'-');}
function buildAlbum(){
  const grid=document.getElementById('albumGrid');
  grid.innerHTML=TEAMS.map(team=>`
    <div class="team-block" data-code="${team.code}" data-name="${team.name.toLowerCase()}">
      <div class="team-label" onclick="toggleTeam('${team.code}')">
        <div style="display:flex;align-items:center;">
          <span class="team-code">${team.code}</span>
          <span class="team-name-full">${team.name}</span>
        </div>
        <div class="team-right">
          <div class="team-prog-bar"><div class="team-prog-fill" id="pf-${team.code}" style="width:0%"></div></div>
          <span class="team-count" id="pt-${team.code}">0/${team.stickers.length} · 0%</span>
          <span class="team-tog" id="tt-${team.code}">▼</span>
        </div>
      </div>
      <div class="team-grid" id="tb-${team.code}">
        ${team.stickers.map(k=>{const num=k.includes(' ')?k.split(' ')[1]:k;return`<div class="chip" id="${chipId(k)}" data-key="${k}"><span class="chip-num">${num}</span><span class="chip-code">${team.code}</span></div>`;}).join('')}
      </div>
    </div>`).join('');
  grid.addEventListener('click',e=>{const c=e.target.closest('.chip');if(c)chipClick(c.dataset.key);});
  grid.addEventListener('contextmenu',e=>{const c=e.target.closest('.chip');if(c){e.preventDefault();chipRight(c.dataset.key);}});
  // long press to remove (mobile)
  let lpTimer=null;
  grid.addEventListener('touchstart',e=>{const c=e.target.closest('.chip');if(!c)return;lpTimer=setTimeout(()=>{lpTimer=null;navigator.vibrate&&navigator.vibrate(40);chipRight(c.dataset.key);toast('✕ Removido');},600);},{passive:true});
  grid.addEventListener('touchend',()=>{clearTimeout(lpTimer);lpTimer=null;},{passive:true});
  grid.addEventListener('touchmove',()=>{clearTimeout(lpTimer);lpTimer=null;},{passive:true});
  refreshAlbumChips();updateGlobalProgress();
}
function refreshAlbumChips(){
  const u=me();if(!u)return;
  TEAMS.forEach(team=>{
    let have=0;
    team.stickers.forEach(k=>{
      const cnt=getCount(u,k);
      const el=document.getElementById(chipId(k));if(!el)return;
      const num=k.includes(' ')?k.split(' ')[1]:k;
      el.className='chip'+(cnt>=1?' have':'')+(cnt>=2?' rep':'');
      el.innerHTML=`<span class="chip-num">${num}</span><span class="chip-code">${team.code}</span>`+(cnt>=2?`<span class="rep-badge">${cnt}</span>`:'');
      if(cnt>=1)have++;
    });
    const pct=Math.round(have/team.stickers.length*100);
    const pf=document.getElementById('pf-'+team.code);const pt=document.getElementById('pt-'+team.code);
    if(pf)pf.style.width=pct+'%';if(pt)pt.textContent=`${have}/${team.stickers.length} · ${pct}%`;
  });
}
function updateGlobalProgress(){
  const u=me();if(!u)return;
  const have=Object.values(u.have||{}).filter(v=>v>=1).length;
  const pct=Math.round(have/TOTAL*100);
  document.getElementById('globalPct').textContent=pct+'%';
  document.getElementById('globalSub').textContent=`${have} Cromos`;
  document.getElementById('globalFill').style.width=pct+'%';
}
window.toggleTeam=function(code){
  const body=document.getElementById('tb-'+code);const tog=document.getElementById('tt-'+code);
  const open=body.classList.toggle('open');tog.classList.toggle('open',open);
};
window.filterTeams=function(q){
  const ql=q.toLowerCase();
  document.querySelectorAll('.team-block').forEach(b=>{b.style.display=(b.dataset.code.toLowerCase().includes(ql)||b.dataset.name.includes(ql))?'':'none';});
};
let saveTimer=null;
async function chipClick(k){
  const u=me();if(!u)return;
  if(!u.have)u.have={};
  u.have[k]=(u.have[k]||0)+1;
  const cnt=u.have[k];
  const el=document.getElementById(chipId(k));
  if(el){const num=k.includes(' ')?k.split(' ')[1]:k;const code=k.split(' ')[0];el.className='chip have'+(cnt>=2?' rep':'');el.innerHTML=`<span class="chip-num">${num}</span><span class="chip-code">${code}</span>`+(cnt>=2?`<span class="rep-badge">${cnt}</span>`:'');}
  updateTeamProg(k,u);updateGlobalProgress();
  clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{await saveUser(u);toast('✓ Guardado');},600);
}
async function chipRight(k){
  const u=me();if(!u||!u.have||!u.have[k])return;
  u.have[k]--;if(u.have[k]<=0)delete u.have[k];
  const cnt=u.have[k]||0;
  const el=document.getElementById(chipId(k));
  if(el){const num=k.includes(' ')?k.split(' ')[1]:k;const code=k.split(' ')[0];el.className='chip'+(cnt>=1?' have':'')+(cnt>=2?' rep':'');el.innerHTML=`<span class="chip-num">${num}</span><span class="chip-code">${code}</span>`+(cnt>=2?`<span class="rep-badge">${cnt}</span>`:'');}
  updateTeamProg(k,u);updateGlobalProgress();
  clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{await saveUser(u);toast('✓ Guardado');},600);
}
function updateTeamProg(k,u){
  const code=k.split(' ')[0];const team=TEAMS.find(t=>t.code===code);if(!team)return;
  const have=team.stickers.filter(s=>getCount(u,s)>=1).length;
  const pct=Math.round(have/team.stickers.length*100);
  const pf=document.getElementById('pf-'+code);const pt=document.getElementById('pt-'+code);
  if(pf)pf.style.width=pct+'%';if(pt)pt.textContent=`${have}/${team.stickers.length} · ${pct}%`;
}
function totalHave(u){return Object.values(u.have||{}).filter(v=>v>=1).length;}
function totalRep(u){return Object.values(u.have||{}).filter(v=>v>=2).length;}
function countTrocas(uid){
  const u=getUser(uid);if(!u)return 0;
  return state.users.filter(o=>{
    if(o.id===uid)return false;
    const ag=Object.keys(u.have||{}).filter(k=>repCount(u,k)>0&&needsSticker(o,k));
    const bg=Object.keys(o.have||{}).filter(k=>repCount(o,k)>0&&needsSticker(u,k));
    return ag.length||bg.length;
  }).length;
}
function renderGrupo(){
  const el=document.getElementById('grupoContent');if(!el)return;
  el.innerHTML=state.users.map(u=>{
    const isMe=u.id===state.currentUserId;
    const pct=Math.round(totalHave(u)/TOTAL*100);
    return`<div class="gcard${isMe?' me':''}">
      <div class="gcard-top">
        <div style="${avS(u.color,46)}">${initials(u.name)}</div>
        <div style="flex:1;"><div class="gcard-name">${u.name}${isMe?'<span class="me-tag">(tu)</span>':''}</div><div class="gcard-sub">${pct}% completo</div></div>
        ${isMe?`<button class="btn-sm" onclick="confirmRemoveMe()" style="color:var(--red);border-color:var(--red);">🗑 Sair</button>`:''}
      </div>
      <div class="gstats">
        <div class="gstat"><div class="gstat-n" style="color:var(--green);">${totalHave(u)}</div><div class="gstat-l">Tens</div></div>
        <div class="gstat"><div class="gstat-n" style="color:var(--gold);">${totalRep(u)}</div><div class="gstat-l">Repetidos</div></div>
        <div class="gstat"><div class="gstat-n">${countTrocas(u.id)}</div><div class="gstat-l">Trocas</div></div>
      </div>
    </div>`;
  }).join('')||'<div class="empty"><span>👥</span>Ainda ninguém no grupo.</div>';
}
window.confirmRemoveMe=async function(){if(!confirm('Apagar os teus dados?'))return;await delUser(state.currentUserId);logout();};
function renderTrocas(){
  const ff=document.getElementById('trocaFilters');const el=document.getElementById('trocasContent');
  ff.innerHTML=`<button class="fb ${state.trocaFilter==='todas'?'active':''}" data-f="todas">Todas</button>`+state.users.map(u=>`<button class="fb ${state.trocaFilter===u.id?'active':''}" data-f="${u.id}">${u.name}</button>`).join('');
  ff.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{state.trocaFilter=b.dataset.f;renderTrocas();}));
  let pairs=[];
  for(let i=0;i<state.users.length;i++){
    for(let j=i+1;j<state.users.length;j++){
      const a=state.users[i],b=state.users[j];
      const ag=Object.keys(a.have||{}).filter(k=>repCount(a,k)>0&&needsSticker(b,k));
      const bg=Object.keys(b.have||{}).filter(k=>repCount(b,k)>0&&needsSticker(a,k));
      if(ag.length||bg.length)pairs.push({a,b,ag,bg});
    }
  }
  if(state.trocaFilter!=='todas')pairs=pairs.filter(p=>p.a.id===state.trocaFilter||p.b.id===state.trocaFilter);
  if(!pairs.length){el.innerHTML=`<div class="empty"><span>${state.users.length<2?'👥':'🤝'}</span>${state.users.length<2?'Adiciona pelo menos 2 membros.':'Ainda não há trocas possíveis.'}</div>`;return;}

  el.innerHTML=pairs.map(({a,b,ag,bg})=>{
    const mutual=ag.length>0&&bg.length>0;
    const tl=(list,u)=>list.length?sortByAlbum(list).map(k=>`<span class="ctag">${k}<span class="qb">×${repCount(u,k)}</span></span>`).join(''):'<span style="font-size:12px;color:var(--muted);">—</span>';

    // build quick-register combos: for each (aGive, bGive) pair, show a register button
    // only show quick buttons if both sides have something (mutual), otherwise show all combos
    let quickBtns='';
    if(mutual){
      // all combos of aGive x bGive
      const combos=[];
      ag.slice(0,3).forEach(give=>{bg.slice(0,3).forEach(get=>{combos.push({give,get});});});
      quickBtns=`<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px;">Registar troca rápida</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${combos.map(({give,get})=>`<button class="qreg-btn" data-aid="${a.id}" data-bid="${b.id}" data-give="${give}" data-get="${get}">
            <span style="color:var(--green);font-weight:700;">${give}</span>
            <span style="color:var(--muted);margin:0 4px;">⇄</span>
            <span style="color:var(--green);font-weight:700;">${get}</span>
            <span style="margin-left:6px;font-size:10px;">✓</span>
          </button>`).join('')}
        </div>
      </div>`;
    } else {
      // one-sided: show the available stickers as registerable
      const oneSide = ag.length>0
        ? ag.slice(0,6).map(give=>`<button class="qreg-btn" data-aid="${a.id}" data-bid="${b.id}" data-give="${give}" data-get="">
            <span style="color:var(--green);font-weight:700;">${a.name.split(' ')[0]} dá ${give}</span>
            <span style="margin-left:6px;font-size:10px;">✓</span>
          </button>`)
        : bg.slice(0,6).map(get=>`<button class="qreg-btn" data-aid="${a.id}" data-bid="${b.id}" data-give="" data-get="${get}">
            <span style="color:var(--green);font-weight:700;">${b.name.split(' ')[0]} dá ${get}</span>
            <span style="margin-left:6px;font-size:10px;">✓</span>
          </button>`);
      quickBtns=`<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px;">Registar troca</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">${oneSide.join('')}</div>
      </div>`;
    }

    return`<div class="tcard">
      <div class="thead">
        <div style="${avS(a.color,32)}">${initials(a.name)}</div>
        <span class="tname">${a.name}</span>
        <span style="color:var(--muted);">⇄</span>
        <div style="${avS(b.color,32)}">${initials(b.name)}</div>
        <span class="tname">${b.name}</span>
        ${mutual?'<span class="badge-m" style="margin-left:auto;">✓ Mútua</span>':'<span class="badge-p" style="margin-left:auto;">Parcial</span>'}
      </div>
      <div class="tbody">
        <div><div class="tcolt">${a.name} pode dar</div><div style="display:flex;flex-wrap:wrap;">${tl(ag,a)}</div></div>
        <div style="text-align:center;padding-top:10px;color:var(--muted);">⇄</div>
        <div><div class="tcolt">${b.name} pode dar</div><div style="display:flex;flex-wrap:wrap;">${tl(bg,b)}</div></div>
      </div>
      ${quickBtns}
    </div>`;
  }).join('');

  // attach quick register button events
  el.querySelectorAll('.qreg-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const aid=btn.dataset.aid,bid=btn.dataset.bid;
      const give=btn.dataset.give,get=btn.dataset.get;
      if(!give||!get){toast('⚠️ Seleciona um cromo de cada lado');return;}
      registarTrocaDireta(aid,bid,give,get);
    });
  });
}
// ── REGISTAR STATE ─────────────────────────────────────
let regState={partner:'',giving:[],getting:[]};

function renderRegistar(){
  const el=document.getElementById('registarContent');if(!el)return;
  const u=me();if(!u)return;

  const logHTML=state.log.length===0
    ?'<div class="empty" style="padding:1rem 0;"><span>📜</span>Ainda sem trocas.</div>'
    :state.log.slice(0,40).map(t=>`<div class="log-e">
        <strong>${t.aN}</strong> deu <span class="m">${Array.isArray(t.ag)?t.ag.join(', '):t.ag}</span>
        ⇄ ${t.bN?`<strong>${t.bN}</strong> deu <span class="m">${Array.isArray(t.bg)?t.bg.join(', '):t.bg}</span>`:'<span style="color:var(--muted);">troca externa</span>'}
        <div style="margin-top:3px;font-size:11px;">${new Date(t.ts).toLocaleString('pt-PT')}</div>
      </div>`).join('');

  const others=state.users.filter(o=>o.id!==state.currentUserId);
  const partnerOpts=`<option value="__ext__">👤 Alguém fora da app</option>`+others.map(o=>`<option value="${o.id}" ${regState.partner===o.id?'selected':''}>${o.name}</option>`).join('');

  // chips for "I gave" — my reps
  const myReps=Object.keys(u.have||{}).filter(k=>repCount(u,k)>0);myReps.sort((a,b)=>(STICKER_IDX[a]??9999)-(STICKER_IDX[b]??9999));
  // chips for "I got" — depends on partner
  const partner=getUser(regState.partner);
  let canGet=[];
  if(partner){canGet=Object.keys(partner.have||{}).filter(k=>repCount(partner,k)>0&&needsSticker(u,k));canGet.sort((a,b)=>(STICKER_IDX[a]??9999)-(STICKER_IDX[b]??9999));}
  else{
    // external: show all stickers I don't have yet
    canGet=TEAMS.flatMap(t=>t.stickers).filter(k=>needsSticker(u,k));canGet.sort((a,b)=>(STICKER_IDX[a]??9999)-(STICKER_IDX[b]??9999));
  }

  function chipGrid(list,selected,toggleFn,emptyMsg){
    if(!list.length)return`<div style="font-size:12px;color:var(--muted);padding:6px 0;">${emptyMsg}</div>`;
    return`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;">`+list.map(k=>{
      const on=selected.includes(k);
      return`<button class="sel-chip${on?' on':''}" data-k="${k}" onclick="${toggleFn}('${k}')">${k}</button>`;
    }).join('')+`</div>`;
  }

  const givingGrid=chipGrid(myReps,regState.giving,'toggleGive','Não tens repetidos de momento.');
  const gettingGrid=chipGrid(canGet,regState.getting,'toggleGet',regState.partner?'Não há cromos possíveis.':'Nenhum cromo em falta.');

  const summary=()=>{
    const g=regState.giving.length,r=regState.getting.length;
    if(!g&&!r)return'';
    return`<div style="background:rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.25);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;">
      ${g?`<div style="margin-bottom:4px;"><span style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;">Dás (${g})</span><br><span style="color:var(--gold);font-weight:700;">${regState.giving.join(' · ')}</span></div>`:''}
      ${r?`<div><span style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;">Recebes (${r})</span><br><span style="color:var(--green);font-weight:700;">${regState.getting.join(' · ')}</span></div>`:''}
    </div>`;
  };

  el.innerHTML=`
    <div class="rcard">
      <div class="rtitle">✅ Registar troca</div>
      <div class="rhint">Seleciona vários cromos de uma vez. Podes trocar com alguém fora da app.</div>

      <div class="rffull">
        <label>Com quem trocaste?</label>
        <select id="tPartner" onchange="onPartnerChange(this.value)">
          <option value="">— Seleciona —</option>
          ${partnerOpts}
        </select>
      </div>

      ${regState.partner!==''?`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:2px;">Tu deste ${regState.giving.length?`<span style="color:var(--gold);">(${regState.giving.length})</span>`:''}</div>
          <div style="font-size:11px;color:var(--muted2);margin-bottom:4px;">Os teus repetidos</div>
          <div style="max-height:180px;overflow-y:auto;">${givingGrid}</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:2px;">Tu recebeste ${regState.getting.length?`<span style="color:var(--green);">(${regState.getting.length})</span>`:''}</div>
          <div style="font-size:11px;color:var(--muted2);margin-bottom:4px;">${partner?'Repetidos do parceiro':'Cromos que te faltam'}</div>
          <div style="max-height:180px;overflow-y:auto;">${gettingGrid}</div>
        </div>
      </div>
      ${summary()}
      <button class="btn-main" id="btnReg" ${(!regState.giving.length&&!regState.getting.length)?'disabled style="opacity:.4;"':''}>✅ Confirmar troca</button>
      `:''}
    </div>
    <div class="rcard"><div class="rtitle" style="margin-bottom:12px;">📜 Histórico</div>${logHTML}</div>`;

  if(regState.partner!==''){
    document.getElementById('btnReg').addEventListener('click',confirmarTroca);
  }
}

window.onPartnerChange=function(val){
  regState.partner=val;regState.giving=[];regState.getting=[];
  renderRegistar();
};
window.toggleGive=function(k){
  const i=regState.giving.indexOf(k);
  if(i>=0)regState.giving.splice(i,1);else regState.giving.push(k);
  renderRegistar();
};
window.toggleGet=function(k){
  const i=regState.getting.indexOf(k);
  if(i>=0)regState.getting.splice(i,1);else regState.getting.push(k);
  renderRegistar();
};

async function confirmarTroca(){
  const u=me();if(!u)return;
  if(!regState.giving.length&&!regState.getting.length){toast('⚠️ Seleciona pelo menos um cromo');return;}
  const partner=getUser(regState.partner);

  // update me
  regState.giving.forEach(k=>{u.have[k]=(u.have[k]||1)-1;if(u.have[k]<=0)delete u.have[k];});
  regState.getting.forEach(k=>{u.have[k]=(u.have[k]||0)+1;});

  const saves=[saveUser(u)];

  // update partner if in app
  if(partner){
    if(!partner.have)partner.have={};
    regState.getting.forEach(k=>{partner.have[k]=(partner.have[k]||1)-1;if(partner.have[k]<=0)delete partner.have[k];});
    regState.giving.forEach(k=>{partner.have[k]=(partner.have[k]||0)+1;});
    saves.push(saveUser(partner));
  }

  const entry={id:uid(),ts:Date.now(),aN:u.name,ag:regState.giving.slice(),bN:partner?partner.name:'',bg:regState.getting.slice()};
  saves.push(saveLog(entry));
  await Promise.all(saves);

  regState={partner:'',giving:[],getting:[]};
  toast('✅ Troca registada!');
  refreshAlbumChips();updateGlobalProgress();renderTrocas();renderRegistar();
}

async function registarTrocaDireta(aid,bid,give,get){
  const a=getUser(aid);const b=getUser(bid);if(!a||!b)return;
  a.have[give]=(a.have[give]||1)-1;if(a.have[give]<=0)delete a.have[give];
  a.have[get]=(a.have[get]||0)+1;
  if(!b.have)b.have={};
  b.have[get]=(b.have[get]||1)-1;if(b.have[get]<=0)delete b.have[get];
  b.have[give]=(b.have[give]||0)+1;
  const entry={id:uid(),ts:Date.now(),aN:a.name,ag:[give],bN:b.name,bg:[get]};
  await Promise.all([saveUser(a),saveUser(b),saveLog(entry)]);
  toast('✅ Troca registada!');
  refreshAlbumChips();updateGlobalProgress();renderTrocas();
}
boot();
</script>
</body>
</html>
